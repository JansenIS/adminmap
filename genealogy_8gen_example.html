<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Родовое древо — 8 поколений (пример + раскладка)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#101826;
      --panel2:#0e1520;
      --fg:#e8eef6;
      --muted:#9db0c8;
      --line:#b9c7db;
      --nodeFill:#ffffff;
      --nodeStroke:#172331;
      --accent:#66a3ff;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #topbar{
      position:fixed; left:0; right:0; top:0;
      display:flex; gap:10px; align-items:center;
      padding:10px 12px; background:linear-gradient(180deg, rgba(16,24,38,0.96), rgba(16,24,38,0.72));
      backdrop-filter: blur(8px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      z-index:10;
    }
    #topbar input[type="text"]{
      width:220px; padding:8px 10px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.12);
      background:var(--panel2); color:var(--fg);
      outline:none;
    }
    #topbar button{
      padding:8px 10px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.14);
      background:var(--panel); color:var(--fg);
      cursor:pointer;
    }
    #topbar button:hover{ border-color: rgba(102,163,255,0.7); }
    #topbar label{ color:var(--muted); font-size:13px; user-select:none; display:flex; gap:8px; align-items:center; }
    #stats{ margin-left:auto; color:var(--muted); font-size:13px; white-space:nowrap; }
    #wrap{
      position:fixed; left:0; right:0; top:52px; bottom:0;
    }
    svg{ width:100%; height:100%; display:block; background: radial-gradient(800px 600px at 30% 15%, rgba(102,163,255,0.10), transparent 55%); }
    .edge{ fill:none; stroke:var(--line); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; opacity:0.85; }
    .node{ fill:var(--nodeFill); stroke:var(--nodeStroke); stroke-width:2; }
    .label{ fill:rgba(232,238,246,0.95); font-size:12px; paint-order:stroke; stroke:rgba(11,15,20,0.80); stroke-width:3px; }
    .genline{ stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .hint{
      position:fixed; left:12px; bottom:12px;
      color:var(--muted); font-size:12px;
      background:rgba(16,24,38,0.70); border:1px solid rgba(255,255,255,0.10);
      border-radius:12px; padding:10px 12px;
      max-width:520px;
    }
    .hint kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11px;
      padding:2px 6px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(14,21,32,0.85);
      color:var(--fg);
    }
  </style>
</head>
<body>
  <div id="topbar">
    <label>Seed <input id="seed" type="text" placeholder="например: 119-isotope" /></label>
    <button id="btnGen">Сгенерировать заново</button>
    <button id="btnFit">Fit</button>
    <label><input id="cbLabels" type="checkbox" checked />Имена</label>
    <label><input id="cbDebug" type="checkbox" />Поколения</label>
    <button id="btnExport">Экспорт JSON</button>
    <div id="stats"></div>
  </div>

  <div id="wrap">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg" aria-label="Genealogy chart">
      <defs>
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
      </defs>
      <g id="viewport"></g>
    </svg>
  </div>

  <div class="hint">
    Перетаскивание: ЛКМ/палец. Масштаб: колесо мыши / pinch (на трекпаде).<br/>
    Быстро: <kbd>F</kbd> — fit, <kbd>R</kbd> — regenerate.
  </div>

<script>
(() => {
  'use strict';

  // ---------------------------
  // Константы геометрии/стиля
  // ---------------------------
  const CFG = {
    generations: 8,              // 8 поколений людей: 0..7
    R: 16,                       // радиус круга
    NODE_GAP: 18,                // промежуток между "слотами" детей
    SPOUSE_GAP: 26,              // промежуток между супругами
    GEN_SPACING: 240,            // вертикальный шаг поколений

    MARRIAGE_DROP: 14,           // от нижней точки круга до брачной горизонтали
    CONNECTOR_DROP: 56,          // от нижней точки круга до "соединительного" трека родителей
    SIBLINE_OFFSET: 95,          // от Y поколения детей вверх (минус) до базового уровня сиблинговой линии

    TRACK_SPACING: 12,           // расстояние между треками
    EPS: 3,

    MAX_UNIONS: 110,             // ограничители, чтобы дерево не взорвалось
    MAX_PERSONS: 420,

    // вероятность "продолжения" ветки (кроме обязательной главной линии)
    continueP: [0.62, 0.52, 0.42, 0.30, 0.22, 0.14, 0.00],
  };

  const DIAM = CFG.R * 2;

  // ---------------------------
  // RNG: seed -> mulberry32
  // ---------------------------
  function xfnv1a(str) {
    let h = 2166136261 >>> 0;
    for (let i=0; i<str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function() {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ---------------------------
  // Модель данных
  // ---------------------------
  function makeId(prefix, n) {
    return prefix + String(n).padStart(4, '0');
  }

  function genY(g) { return g * CFG.GEN_SPACING; }

  // persons: Map<id, {id, name, gen, parentsUnionId, unionsAsPartner:[], x,y}>
  // unions:  Map<id, {id, gen, partners:[pid], children:[pid], subtreeW, ownW, anchorX, sibY, connY, sibMinX, sibMaxX, sibMidX, marriageMidX}>
  function generateFamily(seedStr) {
    const rng = mulberry32(xfnv1a(seedStr));

    const persons = new Map();
    const unions  = new Map();
    const unionsByGen = Array.from({length: CFG.generations-1}, () => []); // unions only 0..6

    let personCounter = 1;
    let unionCounter = 1;

    function newPerson(gen, isExternal=false) {
      const id = makeId('P', personCounter++);
      const name = (isExternal ? 'X' : 'P') + gen + '-' + id.slice(1);
      const p = { id, name, gen, parentsUnionId: null, unionsAsPartner: [], x: 0, y: 0, external: !!isExternal };
      persons.set(id, p);
      return id;
    }

    function newUnion(gen, aId, bId) {
      const id = makeId('U', unionCounter++);
      const u = { id, gen, partners: [aId, bId].filter(Boolean), children: [],
                subtreeW: 0, ownW: 0, anchorX: 0,
                sibY: null, connY: null,
                sibMinX: null, sibMaxX: null, sibMidX: null, marriageMidX: null
      };
      unions.set(id, u);
      unionsByGen[gen].push(id);
      if (aId) persons.get(aId).unionsAsPartner.push(id);
      if (bId) persons.get(bId).unionsAsPartner.push(id);
      return id;
    }

    function randInt(min, max) {
      return Math.floor(rng() * (max - min + 1)) + min;
    }

    // Root (основательская пара)
    const founderA = newPerson(0, false);
    const founderB = newPerson(0, false);
    const rootUnion = newUnion(0, founderA, founderB);

    // Главная линия для гарантии глубины 8 поколений
    let mainlineUnionId = rootUnion;

    for (let g = 0; g < CFG.generations - 1; g++) { // unions exist 0..6
      const list = unionsByGen[g];
      if (!list || list.length === 0) continue;

      for (const uId of list) {
        const u = unions.get(uId);

        // Дети (1..9)
        const kidsCount = randInt(1, 9);
        const kids = [];
        for (let i = 0; i < kidsCount; i++) {
          if (persons.size >= CFG.MAX_PERSONS) break;
          const childId = newPerson(g + 1, false);
          const child = persons.get(childId);
          child.parentsUnionId = uId;
          kids.push(childId);
        }
        u.children = kids;

        // Если это последний уровень союзов (g==6), детей больше не женим
        if (g >= CFG.generations - 2) continue;

        // Определяем, кого женим (создаём union в g+1)
        const toMarry = new Set();

        // обязательный наследник для главной линии
        let heirChildId = null;
        if (uId === mainlineUnionId) {
          if (kids.length === 0) continue;
          heirChildId = kids[randInt(0, kids.length - 1)];
          toMarry.add(heirChildId);
        }

        // случайные продолжения (ветвление) с ограничением по количеству союзов
        const p = CFG.continueP[g] ?? 0.2;
        for (const cId of kids) {
          if (unions.size >= CFG.MAX_UNIONS) break;
          if (cId === heirChildId) continue;
          if (rng() < p) toMarry.add(cId);
        }

        // создаём союзы детям (семейный человек слева, внешний супруг справа)
        let nextMainlineUnion = null;

        for (const cId of toMarry) {
          if (unions.size >= CFG.MAX_UNIONS) break;
          if (persons.size >= CFG.MAX_PERSONS) break;
          const spouseId = newPerson(g + 1, true);
          const childUnionId = newUnion(g + 1, cId, spouseId);
          if (cId === heirChildId) nextMainlineUnion = childUnionId;
        }

        // протягиваем главную линию
        if (uId === mainlineUnionId && nextMainlineUnion) {
          mainlineUnionId = nextMainlineUnion;
        }
      }
    }

    // гарантируем, что получилась глубина 8 поколений: если где-то обрыв, просто принимаем,
    // но у нас есть forced mainline, так что обычно глубина достигается.

    return { persons, unions, rootUnionId: rootUnion, seed: seedStr };
  }

  // ---------------------------
  // Лэйаут: "семейные узлы" + tidy-подобная раскладка по ширинам
  // ---------------------------
  function buildPrimaryUnionIndex(data) {
    // Для ребёнка в нашей генерации "основной union" = первый unionAsPartner (если есть)
    // (в нашей модели это корректно: у продолжателя 1 брак).
    const idx = new Map();
    for (const [pid, p] of data.persons.entries()) {
      if (p.unionsAsPartner && p.unionsAsPartner.length > 0) idx.set(pid, p.unionsAsPartner[0]);
    }
    return idx;
  }

  function measureUnion(data, primaryUnionOfPerson, unionId, memo) {
    if (memo.has(unionId)) return;
    memo.add(unionId);

    const u = data.unions.get(unionId);

    // измеряем детей снизу вверх
    const childReq = [];
    for (const cId of u.children) {
      const cuId = primaryUnionOfPerson.get(cId);
      if (cuId) {
        measureUnion(data, primaryUnionOfPerson, cuId, memo);
        childReq.push(data.unions.get(cuId).subtreeW);
      } else {
        childReq.push(DIAM);
      }
    }

    const childBlockW = childReq.length === 0 ? 0 :
      childReq.reduce((a,b)=>a+b, 0) + CFG.NODE_GAP * (childReq.length - 1);

    const ownW = (u.partners.length === 2)
      ? (2 * DIAM + CFG.SPOUSE_GAP)
      : DIAM;

    u.ownW = ownW;
    u.subtreeW = Math.max(ownW, childBlockW);
  }

  function placeUnion(data, primaryUnionOfPerson, unionId, anchorX, memoPlace) {
    if (memoPlace.has(unionId)) return;
    memoPlace.add(unionId);

    const u = data.unions.get(unionId);
    u.anchorX = anchorX;

    // Позиции супругов
    const y = genY(u.gen);
    if (u.partners.length === 2) {
      const leftX  = anchorX - (CFG.SPOUSE_GAP / 2 + DIAM / 2);
      const rightX = anchorX + (CFG.SPOUSE_GAP / 2 + DIAM / 2);
      const a = data.persons.get(u.partners[0]);
      const b = data.persons.get(u.partners[1]);
      a.x = leftX;  a.y = y;
      b.x = rightX; b.y = y;
    } else if (u.partners.length === 1) {
      const a = data.persons.get(u.partners[0]);
      a.x = anchorX; a.y = y;
    }

    // Дети: раскладываем блок под union
    const kids = u.children;
    if (!kids || kids.length === 0) return;

    // required widths per child slot
    const reqW = kids.map(cId => {
      const cuId = primaryUnionOfPerson.get(cId);
      if (cuId) return data.unions.get(cuId).subtreeW;
      return DIAM;
    });

    const childBlockW = reqW.reduce((a,b)=>a+b, 0) + CFG.NODE_GAP * (reqW.length - 1);
    let cursor = anchorX - childBlockW / 2;

    for (let i = 0; i < kids.length; i++) {
      const cId = kids[i];
      const w = reqW[i];
      const slotCenter = cursor + w / 2;
      const cuId = primaryUnionOfPerson.get(cId);
      if (cuId) {
        placeUnion(data, primaryUnionOfPerson, cuId, slotCenter, memoPlace);
      } else {
        const child = data.persons.get(cId);
        child.x = slotCenter;
        child.y = genY(u.gen + 1);
      }
      cursor += w + CFG.NODE_GAP;
    }
  }

  function reorderChildrenOnce(data, primaryUnionOfPerson) {
    // После первичной раскладки: сортируем детей в каждой семье по barycenter (x дочернего union или x человека)
    for (const [uId, u] of data.unions.entries()) {
      if (!u.children || u.children.length <= 2) continue;
      const scored = u.children.map(cId => {
        const cuId = primaryUnionOfPerson.get(cId);
        if (cuId) return { cId, key: data.unions.get(cuId).anchorX };
        return { cId, key: data.persons.get(cId).x };
      });
      scored.sort((a,b) => a.key - b.key);
      u.children = scored.map(s => s.cId);
    }
  }

  // ---------------------------
  // Треки для горизонталей (интервальное раскрашивание)
  // ---------------------------
  function assignIntervalTracks(intervals) {
    // intervals: [{id, x1, x2}]
    // returns Map<id, trackIndex>
    const items = intervals
      .map(it => ({...it, l: Math.min(it.x1, it.x2), r: Math.max(it.x1, it.x2)}))
      .sort((a,b) => a.l - b.l || a.r - b.r);

    const trackEnds = []; // end per track
    const trackMap = new Map();

    for (const it of items) {
      let chosen = -1;
      let bestEnd = Infinity;
      for (let t = 0; t < trackEnds.length; t++) {
        const end = trackEnds[t];
        if (end < it.l - CFG.EPS && end < bestEnd) {
          bestEnd = end;
          chosen = t;
        }
      }
      if (chosen === -1) {
        chosen = trackEnds.length;
        trackEnds.push(it.r);
      } else {
        trackEnds[chosen] = it.r;
      }
      trackMap.set(it.id, chosen);
    }
    return trackMap;
  }

  function computeTracks(data) {
    // 1) предвычисления: sibMinX/sibMaxX/sibMidX, marriageMidX
    for (const [uId, u] of data.unions.entries()) {
      if (!u.children || u.children.length === 0) continue;

      const childXs = u.children.map(pid => data.persons.get(pid).x);
      const minX = Math.min(...childXs);
      const maxX = Math.max(...childXs);
      u.sibMinX = minX;
      u.sibMaxX = maxX;
      u.sibMidX = (minX + maxX) / 2;

      if (u.partners.length === 2) {
        const a = data.persons.get(u.partners[0]);
        const b = data.persons.get(u.partners[1]);
        u.marriageMidX = (a.x + b.x) / 2;
      } else if (u.partners.length === 1) {
        u.marriageMidX = data.persons.get(u.partners[0]).x;
      } else {
        u.marriageMidX = u.anchorX;
      }
    }

    // 2) sibling lines tracks by child generation
    const sibByGen = new Map(); // gChild -> [{id,x1,x2}]
    for (const [uId, u] of data.unions.entries()) {
      if (!u.children || u.children.length === 0) continue;
      const gChild = u.gen + 1;
      if (!sibByGen.has(gChild)) sibByGen.set(gChild, []);
      sibByGen.get(gChild).push({ id: uId, x1: u.sibMinX, x2: u.sibMaxX });
    }
    for (const [gChild, intervals] of sibByGen.entries()) {
      const tracks = assignIntervalTracks(intervals);
      for (const it of intervals) {
        const u = data.unions.get(it.id);
        const track = tracks.get(it.id) || 0;
        const baseY = genY(gChild) - CFG.SIBLINE_OFFSET;
        u.sibY = baseY + track * CFG.TRACK_SPACING;
        // не опускаться слишком близко к кругам детей
        const maxY = genY(gChild) - CFG.R - 6;
        if (u.sibY > maxY) u.sibY = maxY;
      }
    }

    // 3) connector horizontals tracks by parent generation
    const conByGen = new Map(); // gParent -> [{id,x1,x2}]
    for (const [uId, u] of data.unions.entries()) {
      if (!u.children || u.children.length === 0) continue;
      const gParent = u.gen;
      if (!conByGen.has(gParent)) conByGen.set(gParent, []);
      conByGen.get(gParent).push({ id: uId, x1: u.marriageMidX, x2: u.sibMidX });
    }
    for (const [gParent, intervals] of conByGen.entries()) {
      const tracks = assignIntervalTracks(intervals);
      for (const it of intervals) {
        const u = data.unions.get(it.id);
        const track = tracks.get(it.id) || 0;
        const baseY = genY(gParent) + CFG.R + CFG.CONNECTOR_DROP;
        u.connY = baseY + track * CFG.TRACK_SPACING;

        // гарантируем: connY < sibY - небольшой зазор
        if (u.sibY !== null && u.connY >= u.sibY - 8) {
          u.sibY = u.connY + 8;
          const gChild = gParent + 1;
          const maxY = genY(gChild) - CFG.R - 6;
          if (u.sibY > maxY) u.sibY = maxY;
        }
      }
    }
  }

  // ---------------------------
  // Генерация сегментов (ортогональные polylines)
  // ---------------------------
  function buildEdges(data) {
    const edges = []; // {points:[[x,y]...], cls}
    const R = CFG.R;

    function poly(points) {
      return points.map(p => p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');
    }

    for (const [uId, u] of data.unions.entries()) {
      if (!u.partners || u.partners.length === 0) continue;

      const y = genY(u.gen);
      const marriageY = y + R + CFG.MARRIAGE_DROP;

      // Брачная линия (супруги -> горизонталь)
      if (u.partners.length === 2) {
        const a = data.persons.get(u.partners[0]);
        const b = data.persons.get(u.partners[1]);
        edges.push({
          cls: 'edge',
          d: poly([
            [a.x, a.y + R],
            [a.x, marriageY],
            [b.x, marriageY],
            [b.x, b.y + R]
          ])
        });
      } else {
        const a = data.persons.get(u.partners[0]);
        edges.push({
          cls: 'edge',
          d: poly([
            [a.x, a.y + R],
            [a.x, marriageY]
          ])
        });
      }

      // Если есть дети — соединители + сиблинговая линия + вертикали детей
      if (u.children && u.children.length > 0 && u.sibY !== null && u.connY !== null) {
        const minX = u.sibMinX;
        const maxX = u.sibMaxX;
        const sibY = u.sibY;
        const connY = u.connY;

        const marriageMidX = u.marriageMidX;
        const sibMidX = u.sibMidX;

        // Родительский "ствол": от середины брака к connY, затем горизонталь к sibMidX, затем вниз к sibY
        edges.push({
          cls: 'edge',
          d: poly([
            [marriageMidX, marriageY],
            [marriageMidX, connY],
            [sibMidX, connY],
            [sibMidX, sibY]
          ])
        });

        // Сиблинговая линия
        edges.push({
          cls: 'edge',
          d: poly([
            [minX, sibY],
            [maxX, sibY]
          ])
        });

        // Вертикали детей к сиблинговой линии
        const childY = genY(u.gen + 1);
        for (const cId of u.children) {
          const c = data.persons.get(cId);
          edges.push({
            cls: 'edge',
            d: poly([
              [c.x, childY - R],
              [c.x, sibY]
            ])
          });
        }
      }
    }

    return edges;
  }

  // ---------------------------
  // Рендер SVG + viewport (пан/зум)
  // ---------------------------
  function computeBounds(data) {
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for (const p of data.persons.values()) {
      minX = Math.min(minX, p.x - CFG.R);
      maxX = Math.max(maxX, p.x + CFG.R);
      minY = Math.min(minY, p.y - CFG.R);
      maxY = Math.max(maxY, p.y + CFG.R);
    }
    // немного под линии
    minY -= 60;
    maxY += 140;
    minX -= 120;
    maxX += 120;
    return {minX, minY, maxX, maxY, w: maxX-minX, h: maxY-minY};
  }

  function render(data, opts) {
    const vp = document.getElementById('viewport');
    vp.innerHTML = '';

    const edges = buildEdges(data);

    // (опционально) линии поколений
    if (opts.debug) {
      for (let g=0; g<CFG.generations; g++) {
        const y = genY(g);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', -100000);
        line.setAttribute('x2',  100000);
        line.setAttribute('y1', y);
        line.setAttribute('y2', y);
        line.setAttribute('class', 'genline');
        vp.appendChild(line);

        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', -60);
        t.setAttribute('y', y - 10);
        t.setAttribute('class', 'label');
        t.textContent = 'gen ' + g;
        vp.appendChild(t);
      }
    }

    // ребра
    for (const e of edges) {
      const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      pl.setAttribute('points', e.d);
      pl.setAttribute('class', e.cls);
      vp.appendChild(pl);
    }

    // узлы
    for (const p of data.persons.values()) {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r', CFG.R);
      c.setAttribute('class', 'node');
      c.setAttribute('filter', 'url(#softShadow)');
      c.dataset.pid = p.id;
      c.addEventListener('mouseenter', () => {
        c.style.stroke = 'var(--accent)';
        c.style.strokeWidth = '3';
      });
      c.addEventListener('mouseleave', () => {
        c.style.stroke = 'var(--nodeStroke)';
        c.style.strokeWidth = '2';
      });
      const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
      title.textContent = `${p.name} (gen ${p.gen})` + (p.external ? ' [external spouse]' : '');
      c.appendChild(title);
      vp.appendChild(c);

      if (opts.labels) {
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', p.x + CFG.R + 6);
        t.setAttribute('y', p.y + 4);
        t.setAttribute('class', 'label');
        t.textContent = p.name;
        vp.appendChild(t);
      }
    }
  }

  // ViewBox pan/zoom
  const svg = document.getElementById('svg');
  let viewBox = {x:-300, y:-120, w:1200, h:900};
  let isPanning = false;
  let panStart = null;

  function setViewBox(vb) {
    viewBox = {...vb};
    svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }
  function fitToBounds(bounds) {
    setViewBox({x:bounds.minX, y:bounds.minY, w:bounds.w, h:bounds.h});
  }

  function svgPoint(clientX, clientY) {
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const m = svg.getScreenCTM();
    if (!m) return {x:0,y:0};
    const inv = m.inverse();
    const p = pt.matrixTransform(inv);
    return {x:p.x, y:p.y};
  }

  svg.addEventListener('pointerdown', (e) => {
    isPanning = true;
    svg.setPointerCapture(e.pointerId);
    const p = svgPoint(e.clientX, e.clientY);
    panStart = {x:p.x, y:p.y, vb:{...viewBox}};
  });

  svg.addEventListener('pointermove', (e) => {
    if (!isPanning || !panStart) return;
    const p = svgPoint(e.clientX, e.clientY);
    const dx = panStart.x - p.x;
    const dy = panStart.y - p.y;
    setViewBox({x:panStart.vb.x + dx, y:panStart.vb.y + dy, w:panStart.vb.w, h:panStart.vb.h});
  });

  svg.addEventListener('pointerup', (e) => {
    isPanning = false;
    panStart = null;
  });

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomFactor = Math.exp((e.deltaY > 0 ? 1 : -1) * 0.12);
    const mouse = svgPoint(e.clientX, e.clientY);

    const nx = mouse.x;
    const ny = mouse.y;

    const newW = viewBox.w * zoomFactor;
    const newH = viewBox.h * zoomFactor;

    // zoom around cursor
    const rx = (nx - viewBox.x) / viewBox.w;
    const ry = (ny - viewBox.y) / viewBox.h;

    const newX = nx - rx * newW;
    const newY = ny - ry * newH;

    setViewBox({x:newX, y:newY, w:newW, h:newH});
  }, {passive:false});

  // ---------------------------
  // Главный пайплайн: generate -> layout -> tracks -> render
  // ---------------------------
  let currentData = null;
  let currentBounds = null;

  function run(seedStr) {
    const data = generateFamily(seedStr);
    const primary = buildPrimaryUnionIndex(data);

    // 1) measure
    const memoM = new Set();
    measureUnion(data, primary, data.rootUnionId, memoM);

    // 2) place
    const memoP = new Set();
    placeUnion(data, primary, data.rootUnionId, 0, memoP);

    // 3) reorder once + recompute (лучше пирамидальность/меньше "ломаности")
    reorderChildrenOnce(data, primary);
    const memoM2 = new Set();
    measureUnion(data, primary, data.rootUnionId, memoM2);
    const memoP2 = new Set();
    placeUnion(data, primary, data.rootUnionId, 0, memoP2);

    // 4) tracks
    computeTracks(data);

    // 5) render
    const opts = {
      labels: document.getElementById('cbLabels').checked,
      debug: document.getElementById('cbDebug').checked,
    };
    render(data, opts);

    // bounds
    currentBounds = computeBounds(data);
    currentData = data;
    updateStats(data);

    // первая подгонка
    if (!run._didFitOnce) {
      fitToBounds(currentBounds);
      run._didFitOnce = true;
    }
  }

  function updateStats(data) {
    const genCount = CFG.generations;
    const perGen = Array.from({length: genCount}, () => 0);
    for (const p of data.persons.values()) perGen[p.gen]++;

    const stats = document.getElementById('stats');
    stats.textContent =
      `Persons: ${data.persons.size} | Unions: ${data.unions.size} | per gen: ${perGen.join('·')}`;
  }

  // ---------------------------
  // UI
  // ---------------------------
  const seedInput = document.getElementById('seed');
  const btnGen = document.getElementById('btnGen');
  const btnFit = document.getElementById('btnFit');
  const cbLabels = document.getElementById('cbLabels');
  const cbDebug = document.getElementById('cbDebug');
  const btnExport = document.getElementById('btnExport');

  function getSeed() {
    const s = seedInput.value.trim();
    if (s) return s;
    // если пусто — seed на основе времени, но отображаем
    const auto = 'auto-' + Date.now();
    seedInput.value = auto;
    return auto;
  }

  btnGen.addEventListener('click', () => run(getSeed()));
  btnFit.addEventListener('click', () => { if (currentBounds) fitToBounds(currentBounds); });

  cbLabels.addEventListener('change', () => { if (currentData) run(getSeed()); });
  cbDebug.addEventListener('change', () => { if (currentData) run(getSeed()); });

  btnExport.addEventListener('click', () => {
    if (!currentData) return;
    const obj = {
      seed: currentData.seed,
      persons: Array.from(currentData.persons.values()).map(p => ({
        id:p.id, name:p.name, gen:p.gen, parentsUnionId:p.parentsUnionId,
        unionsAsPartner:p.unionsAsPartner.slice(), x:+p.x.toFixed(2), y:+p.y.toFixed(2), external:!!p.external
      })),
      unions: Array.from(currentData.unions.values()).map(u => ({
        id:u.id, gen:u.gen, partners:u.partners.slice(), children:u.children.slice(),
        anchorX:+u.anchorX.toFixed(2), subtreeW:+u.subtreeW.toFixed(2), ownW:+u.ownW.toFixed(2),
        sibY:u.sibY==null?null:+u.sibY.toFixed(2), connY:u.connY==null?null:+u.connY.toFixed(2)
      })),
      rootUnionId: currentData.rootUnionId
    };
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'genealogy_example_8gen.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') { if (currentBounds) fitToBounds(currentBounds); }
    if (e.key === 'r' || e.key === 'R') { run(getSeed()); }
  });

  // init
  seedInput.value = '119-isotope';
  run(getSeed());

})();
</script>
</body>
