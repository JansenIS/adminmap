<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin v4</title>
<style>
  html,body{margin:0;height:100%;background:#07111b;color:#e9f2ff;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
  #appFrame{width:100%;height:100%;border:0;display:block;background:#07111b}
  #fallback{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:#07111b;color:#e9f2ff}
  .fallback-box{max-width:760px;border:1px solid #2b4057;border-radius:18px;padding:20px;background:#0c1621;line-height:1.5}
  .fallback-box code{background:#111d2a;border:1px solid #2b4057;border-radius:8px;padding:2px 6px}
</style>
  <link rel="stylesheet" href="css/telegraph.css" />
</head>
<body>
<iframe id="appFrame" src="admin_ui_alt.html"></iframe>
<div id="fallback"><div class="fallback-box"><h2 style="margin-top:0">Не удалось применить v4</h2><p>Этот файл должен лежать рядом с <code>admin_ui_alt.html</code> и открываться с того же пути и домена. Иначе браузер не даст доступ к DOM исходной страницы.</p><p id="fallbackMsg" style="opacity:.8"></p></div></div>
<script>
(function(){
  const frame = document.getElementById('appFrame');
  const fallback = document.getElementById('fallback');
  const fallbackMsg = document.getElementById('fallbackMsg');

  function showError(msg){
    fallback.style.display = 'flex';
    fallbackMsg.textContent = msg || '';
  }

  function cardWrap(doc,title){
    const card = doc.createElement('article');
    card.className = 'card card--tight dock-card';
    const head = doc.createElement('div');
    head.className = 'card-head';
    head.innerHTML = '<div class="card-title">'+title+'</div>';
    card.appendChild(head);
    return card;
  }

  function moveAllChildren(src,dst){
    while(src.firstChild) dst.appendChild(src.firstChild);
  }

  function clearModalBody(panel){
    const body = panel && panel.querySelector('.panel-modal__body');
    if(body) body.innerHTML = '';
  }

  function transform(){
    let doc, win;
    try {
      win = frame.contentWindow;
      doc = frame.contentDocument || win.document;
    } catch (e) {
      showError('Нет same-origin доступа к iframe: ' + e.message);
      return;
    }
    if(!doc) { showError('Не удалось получить document iframe.'); return; }

    const workspace = doc.querySelector('.workspace');
    const topbar = doc.querySelector('.topbar');
    const layout = doc.querySelector('.layout-grid');
    const mapShell = doc.querySelector('.map-shell');
    const inspector = doc.querySelector('.inspector');
    const appbar = doc.querySelector('.appbar');
    const mapArea = doc.getElementById('mapArea');
    const turnCard = doc.getElementById('turnCurrentYear')?.closest('article.card');
    const provincePropsCard = doc.getElementById('provincePropsCard');
    const selectionCard = doc.getElementById('selName')?.closest('article.card');
    const newBlocksCard = inspector ? inspector.querySelector('article.card:last-of-type') : null;

    if(!workspace || !topbar || !layout || !mapShell || !inspector || !appbar || !mapArea || !turnCard || !provincePropsCard || !selectionCard){
      showError('Исходный DOM отличается от ожидаемого: не найдены базовые контейнеры.');
      return;
    }

    const accessPanel = doc.getElementById('adminAccessPanel');
    const provincePanel = doc.getElementById('adminProvincePanel');
    const realmPanel = doc.getElementById('adminRealmPanel');
    const warPanel = doc.getElementById('adminWarPanel');
    const dataPanel = doc.getElementById('adminDataPanel');
    const ordersPanel = doc.getElementById('adminOrdersPanel');
    const npcPanel = doc.getElementById('adminNpcPanel');
    const manualEditModal = doc.getElementById('manualEditModal');
    const arrierbanModal = doc.getElementById('arrierbanModal');
    const armyManageModal = doc.getElementById('armyManageModal');

    const provinceArticles = provincePanel ? Array.from(provincePanel.querySelectorAll('.panel-modal__body > article.card')) : [];
    const realmArticles = realmPanel ? Array.from(realmPanel.querySelectorAll('.panel-modal__body > article.card')) : [];
    const warArticles = warPanel ? Array.from(warPanel.querySelectorAll('.panel-modal__body > article.card')) : [];
    const accessArticles = accessPanel ? Array.from(accessPanel.querySelectorAll('.panel-modal__body > article.card')) : [];
    const dataArticles = dataPanel ? Array.from(dataPanel.querySelectorAll('.panel-modal__body > article.card')) : [];
    const ordersBody = ordersPanel ? ordersPanel.querySelector('.panel-modal__body') : null;
    const npcBody = npcPanel ? npcPanel.querySelector('.panel-modal__body') : null;
    const manualBody = manualEditModal ? manualEditModal.querySelector('.editor-modal__body') : null;

    const inject = doc.createElement('style');
    inject.textContent = `
      html,body{height:100%;overflow:hidden!important}
      body{min-height:100vh;overflow:hidden!important;background:
        radial-gradient(circle at top left, rgba(77,124,199,.16), transparent 34%),
        radial-gradient(circle at top right, rgba(118,63,151,.12), transparent 28%),
        linear-gradient(180deg,#08111b 0%, #071019 100%)!important}
      .workspace{height:100vh;display:grid;grid-template-rows:auto auto 1fr!important;gap:12px;padding:10px 12px 12px}
      .topbar{padding:0!important;display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;gap:12px;align-items:start}
      .topbar__main{display:flex!important;flex-direction:column;align-items:flex-start!important;gap:10px!important}
      .topbar__brand{display:flex;align-items:center;gap:12px}
      .topbar__title{font-size:18px!important;font-weight:760!important}
      #flagsStatus{display:block!important}
      .topbar__menu{display:none!important}
      .topbar__actions{display:flex!important;flex-wrap:wrap;gap:8px;justify-content:flex-end}
      .layout-grid{min-height:0!important;display:grid!important;grid-template-columns:minmax(0,1fr) 430px!important;gap:12px!important;padding:0!important}
      .map-shell{min-height:0;display:grid!important;grid-template-rows:auto 1fr!important;gap:12px}
      .appbar{display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;gap:12px;padding:10px 12px!important;border:1px solid #253a50!important;border-radius:18px!important;background:linear-gradient(180deg, rgba(14,24,37,.96), rgba(9,16,26,.96))!important;box-shadow:0 18px 44px rgba(0,0,0,.34)!important}
      .appbar__left,.appbar__right{display:flex!important;align-items:center;gap:8px;flex-wrap:wrap}
      .map-shell .map-stage{min-height:0;display:grid;grid-template-rows:auto 1fr}
      .map-stage__head{display:flex!important;justify-content:space-between;align-items:center;margin-bottom:8px}
      .map-stage__head .chips{display:flex;gap:8px;flex-wrap:wrap}
      .map-stage__head .map-chip{padding:7px 10px;border-radius:999px;background:#0b1520;border:1px solid #25394d;font-size:11px;color:#9eb4cb}
      .maparea{min-height:0!important;overflow:auto!important;padding:8px!important;background:linear-gradient(180deg,#071019 0%, #060d15 100%)!important;border:1px solid #253a50;border-radius:18px}
      #mapWrap{position:relative;display:inline-block;line-height:0;background:#0a121c;border:1px solid rgba(41,60,82,.7);border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.24);overflow:hidden}
      .inspector{display:grid!important;grid-template-rows:auto 1fr!important;gap:12px;min-height:0;overflow:hidden}
      .dock-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      .dock-tab-btn{display:inline-flex;justify-content:center;align-items:center;min-height:40px;padding:8px 10px;border-radius:12px;border:1px solid #2c445d;background:#0f1b29;color:#e9f2ff;font-size:12px;font-weight:750;cursor:pointer}
      .dock-tab-btn.is-active{border-color:#79b2ff;background:#17314b}
      .dock-panels{min-height:0;overflow:auto;display:grid;gap:12px;padding-right:2px}
      .dock-panel{display:none;gap:12px;align-content:start}
      .dock-panel.is-active{display:grid}
      .dock-card{margin:0!important}
      .dock-card .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
      .topbar__session-metrics{display:flex;flex-wrap:wrap;gap:8px}
      .session-pill{padding:8px 10px;border-radius:12px;border:1px solid #25394d;background:#0b1520;font-size:11px;color:#9eb4cb;display:flex;flex-direction:column;gap:4px;min-width:96px}
      .session-pill b{color:#e9f2ff;font-size:13px}
      .inline-note{font-size:12px;color:#9eb4cb;line-height:1.45}
      .panel-modal[data-inline='true'], .editor-modal[data-inline='true']{display:none!important}
      .modal-keep{display:block}
      #adminCompatLayer{display:none!important}
      .context-subtabs{display:flex;flex-wrap:wrap;gap:8px}
      .context-subtabs button{min-height:36px;padding:7px 10px;border-radius:10px}
      .context-anchor{scroll-margin-top:10px}
      @media (max-width:1180px){ .layout-grid{grid-template-columns:1fr!important;grid-template-rows:minmax(0,1fr) auto!important}.inspector{max-height:45vh}.map-shell{order:-1} }
    `;
    doc.head.appendChild(inject);

    // Compact session metrics in header using existing live nodes.
    const sessionMetrics = doc.createElement('div');
    sessionMetrics.className = 'topbar__session-metrics';
    const metric1 = doc.createElement('div'); metric1.className = 'session-pill'; metric1.innerHTML = 'Год / ход<b id="turnCurrentYearProxy">—</b>';
    const metric2 = doc.createElement('div'); metric2.className = 'session-pill'; metric2.innerHTML = 'Статус<b id="turnCurrentStatusProxy">—</b>';
    const metric3 = doc.createElement('div'); metric3.className = 'session-pill'; metric3.innerHTML = 'Казна провинций<b id="turnTreasuryProvSumProxy">—</b>';
    const metric4 = doc.createElement('div'); metric4.className = 'session-pill'; metric4.innerHTML = 'Казна сущностей<b id="turnTreasuryEntitySumProxy">—</b>';
    sessionMetrics.append(metric1,metric2,metric3,metric4);
    topbar.querySelector('.topbar__main').appendChild(sessionMetrics);

    function syncText(srcId,dstId){
      const src = doc.getElementById(srcId);
      const dst = doc.getElementById(dstId);
      if(!src || !dst) return;
      const update = () => { dst.textContent = (src.textContent || '—').trim() || '—'; };
      update();
      new win.MutationObserver(update).observe(src,{childList:true,subtree:true,characterData:true});
    }
    syncText('turnCurrentYear','turnCurrentYearProxy');
    syncText('turnCurrentStatus','turnCurrentStatusProxy');
    syncText('turnTreasuryProvSum','turnTreasuryProvSumProxy');
    syncText('turnTreasuryEntitySum','turnTreasuryEntitySumProxy');

    // Remove top launcher clutter.
    const launcher = topbar.querySelector('.topbar__menu');
    if(launcher) launcher.remove();

    // Build dock tabs.
    inspector.innerHTML = '';
    const tabs = doc.createElement('div'); tabs.className = 'dock-tabs';
    const panels = doc.createElement('div'); panels.className = 'dock-panels';
    const defs = [
      ['overview','Обзор'],
      ['actions','Действия'],
      ['structure','Структура'],
      ['data','Данные']
    ];
    const panelMap = {};
    defs.forEach(([key,label],i)=>{
      const b = doc.createElement('button');
      b.type='button'; b.className='dock-tab-btn'+(i===0?' is-active':''); b.textContent=label; b.dataset.tab=key;
      const p = doc.createElement('section');
      p.className='dock-panel'+(i===0?' is-active':''); p.dataset.tab=key;
      b.addEventListener('click',()=>{
        tabs.querySelectorAll('.dock-tab-btn').forEach(x=>x.classList.toggle('is-active',x===b));
        panels.querySelectorAll('.dock-panel').forEach(x=>x.classList.toggle('is-active',x===p));
      });
      tabs.appendChild(b); panels.appendChild(p); panelMap[key]=p;
    });
    inspector.append(tabs,panels);

    // Overview
    panelMap.overview.appendChild(selectionCard);
    const hierarchyCard = cardWrap(doc,'Родство и контекст');
    hierarchyCard.innerHTML += '<div class="kv"><div><b>Сюзерен:</b> <span id="personModalSuzerainInline">—</span></div><div><b>Сеньоры:</b> <span id="personModalSeniorsInline">—</span></div><div><b>Вассалы:</b> <span id="personModalVassalsInline">—</span></div><div class="inline-note" id="personModalBioInline">Биография будет добавлена позже.</div></div>';
    panelMap.overview.appendChild(hierarchyCard);
    panelMap.overview.appendChild(turnCard);

    function proxyText(srcId,dstId){
      const src = doc.getElementById(srcId), dst = doc.getElementById(dstId); if(!src||!dst) return;
      const update = ()=>{ dst.textContent = (src.textContent || '—').trim() || '—'; };
      update();
      new win.MutationObserver(update).observe(src,{childList:true,subtree:true,characterData:true});
    }
    proxyText('personModalSuzerain','personModalSuzerainInline');
    proxyText('personModalSeniors','personModalSeniorsInline');
    proxyText('personModalVassals','personModalVassalsInline');
    proxyText('personModalBio','personModalBioInline');

    // Actions
    panelMap.actions.appendChild(provincePropsCard);
    provincePropsCard.classList.add('context-anchor');
    provincePropsCard.dataset.mode = 'bulk';
    if(provinceArticles.length){ provinceArticles.forEach(a=>panelMap.actions.appendChild(a)); }
    if(realmArticles[0]) panelMap.actions.appendChild(realmArticles[0]);

    // Structure
    if(realmArticles[1]) panelMap.structure.appendChild(realmArticles[1]);
    warArticles.forEach(a=>panelMap.structure.appendChild(a));
    if(newBlocksCard) panelMap.structure.appendChild(newBlocksCard);
    if(ordersBody){
      const c = cardWrap(doc,'Приказы, вердикты и телеграф');
      moveAllChildren(ordersBody,c);
      panelMap.structure.appendChild(c);
    }
    if(npcBody){
      const c = cardWrap(doc,'NPC, организации и LLM');
      moveAllChildren(npcBody,c);
      panelMap.structure.appendChild(c);
    }

    // Data
    accessArticles.forEach(a=>panelMap.data.appendChild(a));
    dataArticles.forEach(a=>panelMap.data.appendChild(a));
    if(manualBody){
      const manualCard = cardWrap(doc,'Расширенный редактор');
      manualCard.appendChild(manualBody);
      panelMap.data.appendChild(manualCard);
    }

    // Hide inlined modals, keep procedural modals.
    [accessPanel, provincePanel, realmPanel, warPanel, dataPanel, ordersPanel, npcPanel, manualEditModal].forEach(p => { if(p){ p.dataset.inline='true'; p.style.display='none'; } });
    [arrierbanModal, armyManageModal].forEach(p => { if(p){ p.dataset.inline='false'; } });

    // Clear emptied panel bodies so accidental openings are harmless.
    [accessPanel, provincePanel, realmPanel, warPanel, dataPanel, ordersPanel, npcPanel].forEach(clearModalBody);

    // Repurpose quick buttons in appbar to tabs / scroll.
    const quickButtons = appbar.querySelectorAll('.appbar__right button[data-panel]');
    quickButtons.forEach(btn => {
      const panel = btn.getAttribute('data-panel');
      btn.removeAttribute('data-panel');
      btn.addEventListener('click', (e)=>{
        e.preventDefault();
        let targetTab = 'overview';
        let anchor = null;
        if(panel === 'adminProvincePanel'){ targetTab = 'actions'; anchor = provinceArticles[0] || provincePropsCard; }
        else if(panel === 'adminRealmPanel'){ targetTab = 'actions'; anchor = realmArticles[0] || panelMap.actions; }
        else if(panel === 'adminWarPanel'){ targetTab = 'structure'; anchor = warArticles[0] || panelMap.structure; }
        else if(panel === 'adminDataPanel'){ targetTab = 'data'; anchor = panelMap.data; }
        const tabBtn = tabs.querySelector('[data-tab="'+targetTab+'"]');
        if(tabBtn) tabBtn.click();
        if(anchor && anchor.scrollIntoView) anchor.scrollIntoView({block:'start',behavior:'smooth'});
      });
    });

    // Header action shortcuts replacing removed launcher.
    const shortcutBar = doc.createElement('div');
    shortcutBar.className = 'context-subtabs';
    [
      ['Провинция','actions',()=>provinceArticles[0] || provincePropsCard],
      ['Сущность','actions',()=>realmArticles[0] || panelMap.actions],
      ['Армии','structure',()=>warArticles[0] || panelMap.structure],
      ['Экспорт / доступ','data',()=>panelMap.data]
    ].forEach(([label,tab,getAnchor])=>{
      const b = doc.createElement('button'); b.type='button'; b.textContent=label;
      b.addEventListener('click',()=>{
        const tabBtn = tabs.querySelector('[data-tab="'+tab+'"]');
        if(tabBtn) tabBtn.click();
        const anchor = getAnchor();
        if(anchor && anchor.scrollIntoView) anchor.scrollIntoView({block:'start',behavior:'smooth'});
      });
      shortcutBar.appendChild(b);
    });
    topbar.querySelector('.topbar__main').appendChild(shortcutBar);

    // Bulk actions visible only for multi-select.
    function syncBulkCard(){
      const count = parseInt((doc.getElementById('provincePropsCount')?.textContent || '0').trim(), 10) || 0;
      provincePropsCard.style.display = count > 1 ? '' : 'none';
    }
    syncBulkCard();
    const bulkSrc = doc.getElementById('provincePropsCount');
    if(bulkSrc) new win.MutationObserver(syncBulkCard).observe(bulkSrc,{childList:true,subtree:true,characterData:true});

    // Make order/npc buttons in legacy card switch to structure tab instead of empty modal.
    panelMap.structure.querySelectorAll('button[data-panel]').forEach(btn => {
      const panel = btn.getAttribute('data-panel');
      if(panel === 'adminOrdersPanel' || panel === 'adminNpcPanel') btn.style.display = 'none';
    });

    // Safer resize after DOM move.
    win.dispatchEvent(new win.Event('resize'));
    setTimeout(()=>win.dispatchEvent(new win.Event('resize')),120);
  }

  frame.addEventListener('load', ()=>{
    try { setTimeout(transform, 80); }
    catch(e){ showError(e.message); }
  });
})();
</script>
  <script src="js/telegraph.js"></script>
</body>
</html>
