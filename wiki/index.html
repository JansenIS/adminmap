<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Энциклопедия мира</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0b0f14; color:#e7eef7; }
    .layout { display:grid; grid-template-columns: 360px 1fr; min-height:100vh; }
    .sidebar { border-right:1px solid #223041; background:#0d131b; padding:14px; box-sizing:border-box; }
    .content { padding:16px; }
    h1 { margin:0 0 10px; font-size:20px; }
    .muted { color:#a6b4c5; font-size:12px; }
    .search { width:100%; box-sizing:border-box; background:#0b0f14; color:#e7eef7; border:1px solid #2b3f56; border-radius:10px; padding:10px; margin:10px 0; }
    .filters { display:flex; flex-wrap:wrap; gap:6px; margin:0 0 10px; }
    .filter-btn { border:1px solid #2b3f56; border-radius:999px; background:#0b0f14; color:#dbe7f5; padding:5px 10px; font-size:12px; cursor:pointer; }
    .filter-btn.active { border-color:#6aa9ff; color:#eaf4ff; background:#102033; }
    .list { display:grid; gap:8px; max-height: calc(100vh - 220px); overflow:auto; }
    .item { border:1px solid #223041; border-radius:10px; padding:10px; background:#0b0f14; cursor:pointer; }
    .item:hover { border-color:#3d5a78; }
    .item h3 { margin:0; font-size:14px; }
    .item p { margin:6px 0 0; font-size:12px; color:#a6b4c5; }
    .card { border:1px solid #223041; background:#0d131b; border-radius:14px; padding:14px; min-height:220px; }
    .section { margin-top:14px; padding-top:14px; border-top:1px solid #223041; }
    .section h3 { margin:0 0 8px; font-size:15px; }
    .kv { display:grid; grid-template-columns: 180px 1fr; gap:6px 10px; font-size:14px; }
    .kv .k { color:#a6b4c5; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-block; padding:4px 8px; border:1px solid #2b3f56; border-radius:999px; font-size:12px; color:#dbe7f5; background:#0b0f14; }
    .related-list { margin:0; padding-left:18px; }
    .related-list li { margin:5px 0; }
    a.inline { color:#9bc7ff; text-decoration:none; }
    a.inline:hover { text-decoration:underline; }
    .topnav { margin-top:8px; }
    .topnav a { color:#9bc7ff; text-decoration:none; font-size:13px; }
    .topnav a:hover { text-decoration:underline; }
    pre { white-space:pre-wrap; word-break:break-word; font-size:12px; color:#dbe7f5; }
    .hero { margin-top:12px; border:1px solid #223041; border-radius:12px; overflow:hidden; background:#0b0f14; }
    .hero img { width:100%; max-height:520px; object-fit:contain; display:block; }
    .character-photo { margin-top:12px; width:min(260px,100%); aspect-ratio:1/1; border:1px solid #223041; border-radius:12px; overflow:hidden; background:#09101a; }
    .character-photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .lineage-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .lineage-item { border:1px solid #223041; border-radius:10px; padding:8px; background:#0b0f14; display:flex; gap:8px; align-items:center; }
    .lineage-item img { width:44px; height:44px; object-fit:contain; border-radius:6px; border:1px solid #2b3f56; background:#09101a; }
    .wiki-richtext p { margin:0 0 0.8em; }
    .wiki-richtext p:last-child { margin-bottom:0; }
    .wiki-richtext ul { margin:0.4em 0 0.8em 1.2em; padding:0; }
    .wiki-richtext h1, .wiki-richtext h2, .wiki-richtext h3 { margin:0.45em 0; }
    .wiki-richtext code { background:#111923; border:1px solid #2b3f56; border-radius:6px; padding:1px 5px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Энциклопедия</h1>
      <div class="muted">Точка доступа к wiki-проекту</div>
      <div class="topnav"><a href="/">← На карту</a> · <a href="/wiki/admin.html">Админка wiki</a></div>
      <input id="search" class="search" type="search" placeholder="Поиск по страницам..." />
      <div id="categoryFilters" class="filters"></div>
      <div id="stats" class="muted">Загрузка…</div>
      <div id="list" class="list"></div>
    </aside>
    <main class="content">
      <div id="card" class="card">
        <h2 style="margin-top:0;">Выберите страницу слева</h2>
        <div class="muted">Поиск работает по названию, типу и ключу страницы.</div>
      </div>
    </main>
  </div>

<script src="/js/wiki_markup.js"></script>
<script>
let pages = [];
let filtered = [];
let activeCategory = 'all';

const CATEGORY_FILTERS = [
  { id: 'all', label: 'Все', match: () => true },
  { id: 'names', label: 'Имена', match: (p) => String(p.kind || '') === 'character' },
  { id: 'clans', label: 'Рода', match: (p) => String(p.kind || '') === 'clan' },
  { id: 'kingdoms', label: 'Королевства', match: (p) => String(p.kind || '') === 'entity' && String(p.entity_type || '') === 'kingdoms' },
  { id: 'great_houses', label: 'Большие Дома', match: (p) => String(p.kind || '') === 'entity' && String(p.entity_type || '') === 'great_houses' },
  { id: 'minor_houses', label: 'Малые Дома', match: (p) => (String(p.kind || '') === 'entity' && (String(p.entity_type || '') === 'minor_houses' || String(p.entity_type || '') === 'vassals')) || /vassal/i.test(String(p.page_key || '')) || /вассал/u.test(String(p.title || '')) },
  { id: 'special_territories', label: 'Особые Территории', match: (p) => (String(p.kind || '') === 'entity' && String(p.entity_type || '') === 'special_territories') || /особ/i.test(String(p.title || '')) || /special/i.test(String(p.page_key || '')) },
  { id: 'free_cities', label: 'Вольные Города', match: (p) => String(p.kind || '') === 'entity' && String(p.entity_type || '') === 'free_cities' },
];

function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function link(href, text) {
  if (!href) return escapeHtml(text || '—');
  return `<a class="inline" href="#" data-wiki-link="${escapeHtml(href)}">${escapeHtml(text || href)}</a>`;
}

function resolveStaticAssetUrl(rawUrl) {
  const url = String(rawUrl || '').trim();
  if (!url) return '';
  if (/^data:image\//i.test(url) || /^blob:/i.test(url) || /^https?:\/\//i.test(url)) return url;
  if (url.startsWith('/')) return url;
  if (/^(people|provinces)\//i.test(url)) return '/' + url;
  return url;
}

function resolveCharacterPhotoUrl(rawUrl, name) {
  const url = String(rawUrl || '').trim();
  if (!url) return '';
  if (/^data:image\//i.test(url) || /^blob:/i.test(url) || /^\/api\/genealogy\/photo\//.test(url)) return url;
  if (/^https?:\/\//i.test(url)) {
    return `/api/genealogy/photo/?url=${encodeURIComponent(url)}&name=${encodeURIComponent(String(name || ''))}`;
  }
  return resolveStaticAssetUrl(url);
}

function emblemTag(svg, alt) {
  const src = String(svg || '').trim();
  if (!src) return '';
  const data = src.startsWith('data:') ? src : ('data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(src))));
  return `<img src="${data}" alt="${escapeHtml(alt || 'Герб')}" />`;
}


function renderWikiText(text) {
  const wiki = window.AdminMapWikiMarkup;
  if (wiki && typeof wiki.toHtml === 'function') {
    return wiki.toHtml(text || '');
  }
  return '<p>' + escapeHtml(text || '') + '</p>';
}

function renderProjectDetails(item) {
  const kind = String(item.kind || '');
  if (kind === 'character' && item.character) {
    const c = item.character;
    const relatives = Array.isArray(c.closest_relatives) ? c.closest_relatives : [];
    const photoUrl = resolveCharacterPhotoUrl(c.photo_url, c.name || item.title || '');
    return `
      ${photoUrl ? `<div class="character-photo"><img src="${escapeHtml(photoUrl)}" alt="Фото персонажа" loading="lazy" /></div>` : ''}
      <div class="section">
        <h3>Персонаж</h3>
        <div class="kv">
          <div class="k">Титул</div><div>${escapeHtml(c.title || '—')}</div>
          <div class="k">Клан</div><div>${link(c.clan_wiki_link, c.clan || '—')}</div>
          <div class="k">Годы жизни</div><div>${escapeHtml((c.birth_year ?? '—') + ' — ' + (c.death_year ?? '...'))}</div>
        </div>
      </div>
      ${relatives.length ? `
      <div class="section">
        <h3>Близкие родственники</h3>
        <ul class="related-list">${relatives.map(r => `<li>${escapeHtml(r.relation || 'relative')}: ${link(r.wiki_link, r.name || r.id)}</li>`).join('')}</ul>
      </div>` : ''}
    `;
  }

  if (kind === 'clan' && item.clan) {
    const members = Array.isArray(item.clan.members) ? item.clan.members : [];
    return `
      <div class="section">
        <h3>Клан</h3>
        <div class="kv">
          <div class="k">Название</div><div>${escapeHtml(item.clan.name || '—')}</div>
          <div class="k">Участников</div><div>${members.length}</div>
        </div>
      </div>
      ${members.length ? `<div class="section"><h3>Состав</h3><ul class="related-list">${members.map(m => `<li>${link(m.wiki_link, m.name || m.id)}${m.title ? ' — ' + escapeHtml(m.title) : ''}</li>`).join('')}</ul></div>` : ''}
    `;
  }

  if (kind === 'entity' && item.entity) {
    const ent = item.entity;
    const pids = Array.isArray(ent.province_pids) ? ent.province_pids : [];
    const provinces = Array.isArray(ent.children && ent.children.provinces) ? ent.children.provinces : [];
    const entities = Array.isArray(ent.children && ent.children.entities) ? ent.children.entities : [];
    const parentEntity = ent.parent_entity && typeof ent.parent_entity === 'object' ? ent.parent_entity : null;
    return `
      <div class="section">
        <h3>Сущность</h3>
        <div class="lineage-grid">
          <div class="lineage-item">${emblemTag(ent.emblem_svg, 'Герб сущности')}<div><div class="muted">Герб</div><strong>${escapeHtml(item.title || ent.id || '—')}</strong></div></div>
          ${parentEntity ? `<div class="lineage-item"><div><div class="muted">Входит в</div><strong>${link(parentEntity.wiki_link, parentEntity.name || parentEntity.id)}</strong></div></div>` : ''}
        </div>
        <div class="kv" style="margin-top:10px;">
          <div class="k">Тип</div><div>${escapeHtml(ent.entity_type || '—')}</div>
          <div class="k">Правитель</div><div>${escapeHtml(ent.ruler || '—')}</div>
          <div class="k">Провинций</div><div>${pids.length}</div>
        </div>
      </div>
      ${entities.length ? `<div class="section"><h3>Зависимые сущности</h3><div class="chips">${entities.map(ch => `<span class="chip">${link(ch.wiki_link, ch.name || ch.id)}</span>`).join('')}</div></div>` : ''}
      ${provinces.length ? `<div class="section"><h3>Провинции</h3><div class="chips">${provinces.map(pr => `<span class="chip">${link(pr.wiki_link, pr.name || ('#' + pr.pid))}</span>`).join('')}</div></div>` : ''}
    `;
  }

  if (kind === 'province' && item.province) {
    const pr = item.province;
    const vassals = Array.isArray(pr.vassals) ? pr.vassals : [];
    return `
      ${pr.background_image ? `<div class="hero"><img src="${escapeHtml(resolveStaticAssetUrl(pr.background_image))}" alt="Карточка провинции" /></div>` : ''}
      <div class="section">
        <h3>Провинция</h3>
        <div class="lineage-grid">
          <div class="lineage-item">${emblemTag(pr.emblem_svg, 'Герб провинции')}<div><div class="muted">Герб провинции</div><strong>${escapeHtml(item.title || ('Провинция ' + (pr.pid || '')))}</strong></div></div>
          <div class="lineage-item">${emblemTag((pr.kingdom && pr.kingdom.emblem_svg) || '', 'Герб королевства')}<div><div class="muted">Королевство</div><strong>${link(pr.kingdom && pr.kingdom.wiki_link, (pr.kingdom && pr.kingdom.name) || '—')}</strong></div></div>
          <div class="lineage-item">${emblemTag((pr.great_house && pr.great_house.emblem_svg) || '', 'Герб БД')}<div><div class="muted">Большой Дом</div><strong>${link(pr.great_house && pr.great_house.wiki_link, (pr.great_house && pr.great_house.name) || '—')}</strong></div></div>
        </div>
        <div class="kv" style="margin-top:10px;">
          <div class="k">ID</div><div>${escapeHtml(pr.pid || '—')}</div>
          <div class="k">Владелец</div><div>${escapeHtml(pr.owner || '—')}</div>
          <div class="k">Сюзерен</div><div>${escapeHtml(pr.suzerain || '—')}</div>
          <div class="k">Рельеф</div><div>${escapeHtml(pr.terrain || '—')}</div>
        </div>
      </div>
      ${vassals.length ? `<div class="section"><h3>Вассалы</h3><div class="chips">${vassals.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('')}</div></div>` : ''}
    `;
  }

  return '';
}


function renderCategoryFilters() {
  const wrap = document.getElementById('categoryFilters');
  if (!wrap) return;
  wrap.innerHTML = CATEGORY_FILTERS.map((cat) => `
    <button type="button" class="filter-btn ${cat.id === activeCategory ? 'active' : ''}" data-cat="${escapeHtml(cat.id)}">${escapeHtml(cat.label)}</button>
  `).join('');
  wrap.querySelectorAll('[data-cat]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const next = String(btn.getAttribute('data-cat') || 'all');
      activeCategory = CATEGORY_FILTERS.some((c) => c.id === next) ? next : 'all';
      renderCategoryFilters();
      renderList();
    });
  });
}

function matchActiveCategory(page) {
  const current = CATEGORY_FILTERS.find((cat) => cat.id === activeCategory) || CATEGORY_FILTERS[0];
  return !!current.match(page);
}

function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filtered = pages.filter(p => {
    const hay = [p.title,p.kind,p.page_key,p.entity_type,p.id].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q) && matchActiveCategory(p);
  });
  const active = CATEGORY_FILTERS.find((cat) => cat.id === activeCategory) || CATEGORY_FILTERS[0];
  document.getElementById('stats').textContent = `Найдено: ${filtered.length} / ${pages.length} · Категория: ${active.label}`;
  const list = document.getElementById('list');
  list.innerHTML = filtered.map((p, i) => `
    <button type="button" class="item" data-i="${i}">
      <h3>${escapeHtml(p.title || p.page_key)}</h3>
      <p>${escapeHtml(p.kind)} · ${escapeHtml(p.page_key)}</p>
    </button>
  `).join('');

  list.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => openPage(filtered[Number(el.dataset.i)]));
  });
}

async function openPage(p) {
  const card = document.getElementById('card');
  card.innerHTML = '<div class="muted">Загрузка страницы…</div>';
  try {
    const url = p.wiki_link || '/api/wiki/show/index.php?kind=' + encodeURIComponent(p.kind);
    const r = await fetch(url);
    const j = await r.json();
    const item = j.item || {};
    card.innerHTML = `
      <h2 style="margin-top:0;">${escapeHtml(item.title || p.title || 'Без названия')}</h2>
      <div class="muted">${escapeHtml(item.kind || p.kind)} · ${escapeHtml(item.page_key || p.page_key)}</div>
      <div class="wiki-richtext">${renderWikiText(item.description || 'Описание отсутствует.')}</div>
      ${renderProjectDetails(item)}
    `;

    card.querySelectorAll('[data-wiki-link]').forEach(el => {
      el.addEventListener('click', async (ev) => {
        ev.preventDefault();
        const href = el.getAttribute('data-wiki-link');
        if (!href) return;
        const target = pages.find(pg => pg.wiki_link === href);
        if (target) return openPage(target);
        const fallback = { title: 'Страница', kind: '', page_key: '', wiki_link: href };
        return openPage(fallback);
      });
    });
  } catch (e) {
    card.innerHTML = '<div class="muted">Ошибка загрузки страницы.</div>';
  }
}

(async function init(){
  const r = await fetch('/api/wiki/index.php');
  const j = await r.json();
  pages = Array.isArray(j.pages) ? j.pages : [];
  renderCategoryFilters();
  renderList();
})();

document.getElementById('search').addEventListener('input', renderList);
</script>
</body>
</html>
