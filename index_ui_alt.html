<!doctype html><html lang="ru"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Публичная карта</title><style>
:root{color-scheme:dark;--border:#24384c;--text:#e9f2ff;--muted:#9eb3c9;--shadow:0 18px 48px rgba(0,0,0,.34)}*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(63,114,183,.18), transparent 32%),linear-gradient(180deg,#08111b 0%, #071019 100%)}button,select,input,a{font:inherit;color:var(--text)}button,.linkbtn,select,input[type=text]{background:#121f2f;border:1px solid #2b425a;border-radius:12px;padding:8px 11px;text-decoration:none}.app{height:100vh;display:grid;grid-template-rows:auto 1fr}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(43,67,92,.75);background:rgba(7,14,22,.88);backdrop-filter:blur(12px)}.topbar__title{font-size:17px;font-weight:760}.topbar__actions{display:flex;gap:8px;flex-wrap:wrap}.workspace{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:12px;padding:12px}.map-shell{min-width:0;min-height:0;display:grid;grid-template-rows:auto 1fr;gap:12px}.appbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg, rgba(14,24,37,.96), rgba(9,16,26,.96));box-shadow:var(--shadow)}.appbar__left,.appbar__right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.map-stage{min-height:0;border-radius:22px;border:1px solid var(--border);overflow:hidden;background:rgba(6,10,16,.92);box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr}.map-stage__head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-bottom:1px solid #203346;background:rgba(9,15,23,.94)}.map-chip{padding:7px 10px;border-radius:999px;background:#0b1520;border:1px solid #25394d;color:var(--muted);font-size:11px;font-weight:650}.maparea{min-height:0;overflow:auto;padding:8px;background:linear-gradient(180deg,#071019 0%, #060d15 100%);display:flex;align-items:center;justify-content:center}#mapWrap{position:relative;display:block;line-height:0;background:#0a121c;border:1px solid rgba(41,60,82,.7);border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.24);overflow:hidden;margin:auto}#baseMap{position:absolute;left:0;top:0;width:100%;height:100%;max-width:none;max-height:none;display:block}canvas{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}#tooltip{position:fixed;z-index:50;pointer-events:none;background: rgba(13,19,27,0.92);border:1px solid #2b3f56;border-radius:10px;padding:8px 10px;font-size:12px;color:#e7eef7;display:none;box-shadow: 0 8px 30px rgba(0,0,0,0.35);max-width: 360px}.inspector{min-height:0;overflow:auto;display:flex;flex-direction:column;gap:12px}.card{padding:14px;border-radius:18px;border:1px solid var(--border);background:linear-gradient(180deg, rgba(15,25,38,.96), rgba(10,17,27,.96));box-shadow:var(--shadow)}.card h3{margin:0 0 10px;font-size:14px}.selection-name{font-size:20px;font-weight:780;line-height:1.2;margin-bottom:10px}.kv{display:grid;gap:8px}.kv div{padding:9px 10px;border-radius:12px;background:#0a1420;border:1px solid #24384d;font-size:13px}.kv label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.inline{display:flex;gap:8px;flex-wrap:wrap}.mode-list{max-height:240px;overflow:auto;padding:10px;border-radius:12px;background:#0a1420;border:1px solid #24384d;font-size:13px}.province-modal,.person-modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;box-sizing:border-box;background:rgba(3,6,10,0.7);backdrop-filter: blur(2px)}.province-modal.open,.person-modal.open{display:flex}.province-modal__window,.person-modal__window{width:min(840px,96vw);max-height:95vh;overflow:auto;background:#0d131b;border:1px solid #2b3f56;border-radius:16px;box-shadow:0 22px 70px rgba(0,0,0,0.48)}.person-modal__window{width:min(520px,96vw)}.province-modal__close,.person-modal__close{position:sticky;top:0;float:right;margin:10px;width:34px;height:34px;border-radius:9px;font-size:18px;line-height:1}.province-modal__content,.person-modal__content{padding:16px;clear:both}.province-modal__map-shot{width:100%;max-height:320px;object-fit:contain;border:1px solid #223041;border-radius:12px;background:#080c11}.province-modal__lineage{margin-top:14px;display:grid;gap:10px}.province-modal__lineage-item{display:flex;align-items:center;gap:10px;font-size:14px}.province-modal__lineage-item span{color:#a6b4c5;min-width:120px}.province-modal__herald{width:42px;height:42px;border-radius:8px;border:1px solid #2b3f56;background:#111923;object-fit:contain}.province-modal__header{margin-top:18px;display:flex;gap:12px;align-items:center}.province-modal__title{margin:0;font-size:28px;letter-spacing:0.08em;text-transform:uppercase}.province-modal__text{margin-top:16px;line-height:1.45;color:#d8e1ec}.person-link{background:none;border:0;color:#9bc7ff;padding:0;margin:0;cursor:pointer;font:inherit;text-decoration:underline}.person-modal__photo-wrap{width:180px;aspect-ratio:1/1;border:1px solid #2b3f56;border-radius:12px;overflow:hidden;background:#111923}.person-modal__photo{width:100%;height:100%;object-fit:cover;display:block}.person-modal__name{margin:14px 0 8px;font-size:24px}.person-modal__kv{display:grid;gap:8px;font-size:13px}.person-modal__bio{margin-top:14px;line-height:1.45;color:#d8e1ec}@media (max-width:980px){.workspace{grid-template-columns:1fr}.inspector{max-height:42vh}}
</style></head><body><div class="app"><header class="topbar"><div class="topbar__title">Публичная карта</div><div class="topbar__actions"><a class="linkbtn" href="/player_admin.html" target="_blank" rel="noopener">Управление</a></div></header><div class="workspace"><section class="map-shell"><div class="appbar"><div class="appbar__left"><input id="stateUrl" type="text" placeholder="state.json" value="state.json" /><button id="reload" type="button">Обновить</button><select id="viewMode"><option value="provinces">Физическая карта</option><option value="kingdoms">Королевства</option><option value="great_houses">Большие Дома</option><option value="minor_houses">Малые Дома</option><option value="free_cities">Вольные Города</option><option value="special_territories">Особые Территории</option></select><button id="toggleProvEmblems" type="button">Гербы</button></div><div class="appbar__right"><span class="map-chip" id="flagsStatus">public</span></div></div><div class="map-stage"><div class="map-stage__head"><div class="inline"><span class="map-chip">ЛКМ: выбор</span><span class="map-chip">Колесо: зум</span></div><div class="inline"><span class="map-chip">Карточки провинций и людей</span></div></div><main id="mapArea" class="maparea"><div id="mapWrap"><img id="baseMap" src="map.png" alt="Карта" /><canvas id="fill"></canvas><canvas id="emblems"></canvas><canvas id="hover"></canvas></div><div id="tooltip"></div></main></div></section><aside class="inspector"><article class="card"><h3>Провинция</h3><div class="selection-name" id="provTitle">—</div><div class="kv"><div><label>PID</label><span id="provPid">—</span></div><div><label>KEY</label><span id="provKey">—</span></div><div><label>Владелец</label><span id="provOwner">—</span></div><div><label>Сюзерен</label><span id="provSuzerain">—</span></div><div><label>Сеньор</label><span id="provSenior">—</span></div><div><label>Местность</label><span id="provTerrain">—</span></div></div><div class="inline" style="margin-top:10px;"><button id="openMicroMap" type="button">Открыть карту провинции</button></div></article><article class="card"><h3 id="provModeListLabel">Состав текущего слоя</h3><div class="mode-list" id="provModeList">—</div></article></aside></div></div><div aria-hidden="true" class="province-modal" id="provinceModal">
<div aria-label="Страница провинции" aria-modal="true" class="province-modal__window" role="dialog">
<button aria-label="Закрыть" class="province-modal__close" id="provinceModalClose" type="button">×</button>
<div class="province-modal__content">
<img alt="Изображение провинции" class="province-modal__map-shot" id="modalProvinceMapImage"/>
<div class="province-modal__lineage">
<div class="province-modal__lineage-item"><span>Королевство</span><img alt="Герб королевства" class="province-modal__herald" id="modalKingdomHerald"/><strong id="modalKingdomName">—</strong></div>
<div class="province-modal__lineage-item"><span>Большой Дом</span><img alt="Герб большого дома" class="province-modal__herald" id="modalGreatHouseHerald"/><strong id="modalGreatHouseName">—</strong></div>
<div class="province-modal__lineage-item"><span>Малый Дом / вассал</span><img alt="Герб малого дома" class="province-modal__herald" id="modalMinorHouseHerald"/><strong id="modalMinorHouseName">—</strong></div>
</div>
<div class="province-modal__header">
<img alt="Герб провинции" class="province-modal__herald" id="modalProvinceHerald"/>
<h2 class="province-modal__title" id="modalProvinceTitle">—</h2>
</div>
<p class="province-modal__text" id="modalProvinceDescription">Описание провинции пока не заполнено.</p>
</div>
</div>
</div><div aria-hidden="true" class="person-modal" id="personModal">
<div aria-label="Карточка персонажа" aria-modal="true" class="person-modal__window" role="dialog">
<button aria-label="Закрыть" class="person-modal__close" id="personModalClose" type="button">×</button>
<div class="person-modal__content">
<div class="person-modal__photo-wrap"><img alt="Фото персонажа" class="person-modal__photo" id="personModalPhoto"/></div>
<h2 class="person-modal__name" id="personModalName">—</h2>
<div class="person-modal__kv">
<div><b>Сюзерен:</b> <span id="personModalSuzerain">—</span></div>
<div><b>Сеньоры:</b> <span id="personModalSeniors">—</span></div>
<div><b>Вассалы:</b> <span id="personModalVassals">—</span></div>
</div>
<p class="person-modal__bio" id="personModalBio">Биография будет добавлена позже.</p>
</div>
</div>
</div>

<script>(function(){function fitMap(){const area=document.getElementById('mapArea');const wrap=document.getElementById('mapWrap');const img=document.getElementById('baseMap');if(!area||!wrap||!img)return;const nw=img.naturalWidth||img.width||0,nh=img.naturalHeight||img.height||0;const aw=Math.max(0,area.clientWidth-20),ah=Math.max(0,area.clientHeight-20);if(!nw||!nh||!aw||!ah)return;const s=Math.min(aw/nw,ah/nh);wrap.style.width=Math.max(1,Math.floor(nw*s))+'px';wrap.style.height=Math.max(1,Math.floor(nh*s))+'px';}const img=document.getElementById('baseMap');if(img){if(img.complete)setTimeout(fitMap,40);else img.addEventListener('load',fitMap,{once:true});}window.addEventListener('load',()=>setTimeout(fitMap,80),{once:true});window.addEventListener('resize',fitMap);const area=document.getElementById('mapArea');if(area&&'ResizeObserver'in window){new ResizeObserver(fitMap).observe(area);}})();</script></body>

</html>
