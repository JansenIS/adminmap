<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Панель игрока</title>
  <style>
    body{margin:0;background:#071018;color:#e8f1ff;font-family:Inter,system-ui,sans-serif}
    .layout{display:grid;grid-template-columns:390px 1fr;height:100vh}
    .side{overflow:auto;padding:14px;border-right:1px solid #1c3347;background:#0d1824}
    .card{background:#111f2d;border:1px solid #27435c;border-radius:14px;padding:12px;margin-bottom:12px}
    h1{margin:0 0 8px;font-size:18px}.muted{color:#9db4cb;font-size:12px}
    input,textarea,select,button{width:100%;box-sizing:border-box;background:#0a1520;color:#eef5ff;border:1px solid #2a4760;border-radius:10px;padding:8px}
    textarea{min-height:78px} button{cursor:pointer;font-weight:700}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .kv{font-size:12px;line-height:1.55}.kv b{display:inline-block;min-width:100px;color:#9db4cb}
    #mapWrap{position:relative;display:inline-block} #baseMap,canvas{position:absolute;left:0;top:0;width:100%;height:100%}
    .map{overflow:auto;padding:14px}
    .zoomRow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;margin-top:8px}
    .zoomRow button{padding:6px 4px;font-size:12px}
    .status{font-size:12px;color:#9bd39f}
    .preview{margin-top:8px;border:1px dashed #365672;border-radius:10px;min-height:120px;display:flex;align-items:center;justify-content:center;background:#0a1520}
    .preview img{max-width:100%;max-height:220px;display:block}
    .mutedSmall{font-size:11px;color:#7f9bb6}
    .modal{position:fixed;inset:0;background:rgba(3,8,12,.7);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}
    .modal.open{display:flex}
    .modalCard{width:min(760px,96vw);max-height:90vh;overflow:auto;background:#102131;border:1px solid #32506a;border-radius:14px;padding:14px}
    .modalClose{float:right;width:auto;padding:6px 10px}
    .armyUnits{margin-top:8px;border:1px solid #2d4c65;border-radius:10px;padding:8px;max-height:220px;overflow:auto}
    .armyUnitRow{display:grid;grid-template-columns:24px 1fr 70px;gap:8px;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid #20384e}
    .armyUnitRow:last-child{border-bottom:none}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side">
      <h1>Панель игрока</h1>
      <div class="muted" id="entityName">Загрузка…</div>

      <div class="card">
        <div>Казна: <b id="treasury">0</b></div>
        <div>Население: <b id="population">0</b></div>
        <div class="muted" id="musterCap"></div>
      </div>

      <div class="card">
        <div class="muted">Режим отображения карты</div>
        <select id="viewMode" style="margin-top:8px;">
          <option value="provinces">Физическая карта</option>
          <option value="kingdoms">Королевства</option>
          <option value="great_houses">Большие Дома</option>
          <option value="minor_houses">Малые Дома</option>
          <option value="free_cities">Вольные Города</option>
          <option value="special_territories">Особые Территории</option>
        </select>
        <div class="zoomRow">
          <button type="button" class="zoomBtn" data-zoom="fit">По экрану</button>
          <button type="button" class="zoomBtn" data-zoom="1">1×</button>
          <button type="button" class="zoomBtn" data-zoom="2">2×</button>
          <button type="button" class="zoomBtn" data-zoom="5">5×</button>
          <button type="button" class="zoomBtn" data-zoom="10">10×</button>
        </div>
      </div>

      <div class="card">
        <div class="muted">Провинция под курсором/выбором</div>
        <div class="kv">
          <div><b>Название</b><span id="infoName">—</span></div>
          <div><b>PID</b><span id="infoPid">—</span></div>
          <div><b>Владелец</b><span id="infoOwner">—</span></div>
          <div><b>Сюзерен</b><span id="infoSuzerain">—</span></div>
          <div><b>Сеньор</b><span id="infoSenior">—</span></div>
          <div><b>Местность</b><span id="infoTerrain">—</span></div>
        </div>
      </div>

      <div class="card">
        <h3>Сущность</h3>
        <textarea id="entityDesc" placeholder="Описание сущности"></textarea>
        <input id="entityImage" placeholder="URL изображения" />
        <textarea id="entityEmblem" placeholder="SVG герба сущности"></textarea>
        <input id="entityEmblemFile" type="file" accept=".svg,image/svg+xml" />
        <div class="preview"><img id="entityEmblemPreview" alt="entity emblem" /></div>
        <button id="saveEntity">Сохранить сущность</button>
      </div>

      <div class="card">
        <h3>Провинция (только свои)</h3>
        <select id="provinceSelect"></select>
        <textarea id="provinceDesc" placeholder="Описание провинции"></textarea>
        <input id="provinceImage" placeholder="URL картинки провинции" />
        <textarea id="provinceEmblem" placeholder="SVG герба провинции"></textarea>
        <input id="provinceEmblemFile" type="file" accept=".svg,image/svg+xml" />
        <div class="preview"><img id="provinceEmblemPreview" alt="province emblem" /></div>
        <button id="saveProvince">Сохранить провинцию</button>
      </div>

      <div class="card">
        <h3>Армии</h3>
        <input id="musterName" placeholder="Название армии" />
        <div class="row"><button id="musterDomainBtn">Созвать домен</button><button id="musterVassalBtn">Созвать вассалов (Арьербан)</button></div>
        <button id="musterRoyalBtn" style="display:none;">Королевский Призыв</button>
        <select id="armySelect"></select>
        <div class="row"><input id="movePid" placeholder="PID перемещения" /><button id="moveBtn">Переместить</button></div>
        <div class="armyUnits" id="armyUnits"></div>
        <div class="row"><input id="splitSize" placeholder="Размер отделения" /><button id="splitBtn">Разделить</button></div>
        <div class="row"><button id="mergeBtn">Слить отмеченные</button><button id="normalizeBtn">Нормализовать</button></div>
        <button id="saveArmyManage">Сохранить структуру армий</button>
        <button id="disbandBtn">Распустить без потерь</button>
      </div>
      <div class="status" id="status"></div>
    </aside>
    <main class="map" id="mapArea">
      <div id="mapWrap">
        <img id="baseMap" src="map.png" alt="map" />
        <canvas id="fill"></canvas><canvas id="emblems"></canvas><canvas id="hover"></canvas>
      </div>
    </main>
  </div>
  <div id="foreignProvinceModal" class="modal" aria-hidden="true">
    <div class="modalCard">
      <button type="button" class="modalClose" id="closeForeignModal">Закрыть</button>
      <h3 id="modalProvinceName">Провинция</h3>
      <div class="kv">
        <div><b>PID</b><span id="modalPid">—</span></div>
        <div><b>Владелец</b><span id="modalOwner">—</span></div>
        <div><b>Сюзерен</b><span id="modalSuzerain">—</span></div>
        <div><b>Сеньор</b><span id="modalSenior">—</span></div>
        <div><b>Местность</b><span id="modalTerrain">—</span></div>
      </div>
      <div class="mutedSmall" style="margin-top:8px;">Описание</div>
      <div id="modalDesc" class="muted"></div>
      <div class="preview" style="margin-top:10px;"><img id="modalEmblem" alt="province emblem" /></div>
    </div>
  </div>
  <script src="js/app_core.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
