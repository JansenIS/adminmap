<!doctype html><html lang='ru'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Вердикты — админка</title>
<style>body{margin:0;background:#0a1320;color:#e9f1ff;font-family:Inter}header{padding:12px 16px;border-bottom:1px solid #2e445b;display:flex;justify-content:space-between}main{display:grid;grid-template-columns:370px 1fr;gap:12px;padding:12px}.card{background:#111d2b;border:1px solid #2a4158;border-radius:14px;padding:12px}.list{max-height:80vh;overflow:auto;display:grid;gap:8px}.order{padding:10px;border:1px solid #36526d;border-radius:10px;cursor:pointer}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}textarea,input,select,button{width:100%;box-sizing:border-box;background:#0d1824;color:#e9f1ff;border:1px solid #2d475f;border-radius:10px;padding:8px}textarea{min-height:120px}.item{border:1px solid #334e68;border-radius:10px;padding:8px;margin-bottom:8px}.row{display:grid;grid-template-columns:1fr 120px 120px;gap:8px;align-items:center}.muted{color:#9cb5cd;font-size:12px}.actions{display:flex;gap:8px}.actions button{width:auto}</style></head>
<body><header><div><b>Вердикты и разбор приказов</b><div class='muted'>Очередь рассмотрения</div></div><a href='admin_ui_alt.html' style='color:#9bc7ff'>← В alt-админку</a></header>
<main><section class='card'><div class='actions'><button id='reload'>Обновить очередь</button></div><div class='row' style='grid-template-columns:1fr 1fr 1fr;margin-top:8px'><input id='turn' type='number' placeholder='Год'><select id='status'><option value=''>Все</option><option>submitted</option><option>pending_review</option><option>needs_clarification</option><option>verdict_ready</option></select><input id='entity' placeholder='Сущность'></div><div class='row' style='grid-template-columns:1fr 1fr 1fr;margin-top:8px'><select id='category'><option value=''>Все категории</option><option>economy</option><option>politics</option><option>laws</option><option>diplomacy</option><option>military</option><option>religion</option><option>intrigue</option><option>other</option></select><select id='hasAttachments'><option value=''>Любые вложения</option><option value='true'>Есть вложения</option><option value='false'>Без вложений</option></select><div class='muted'>Фильтры очереди</div></div><div id='list' class='list' style='margin-top:10px'></div></section>
<section class='card'><div class='split'><div><h3 id='title'>—</h3><div id='rp' class='muted'></div><div id='items'></div></div><div><textarea id='publicVerdict' placeholder='Публичный РП-вердикт'></textarea><textarea id='privateNotes' placeholder='Приватные заметки'></textarea><textarea id='clarText' placeholder='Запрос на уточнение'></textarea><textarea id='effects' placeholder='Effects JSON массив'></textarea><div id='effectsPreview' class='muted' style='white-space:pre-wrap;border:1px dashed #335069;border-radius:8px;padding:8px;margin-top:6px'>Предпросмотр механических изменений появится здесь.</div><div class='actions'><button id='saveVerdict'>Сохранить вердикт</button><button id='apply'>Применить эффекты</button><button id='publish'>Опубликовать</button><button id='clar'>Запросить уточнение</button><button id='reject'>Отклонить</button></div></div></div></section></main>
<script src='js/admin_orders_ui_alt.js'></script></body></html>
