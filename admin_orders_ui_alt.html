<!doctype html><html lang='ru'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Вердикты — админка</title>
<style>
body{margin:0;background:#0a1320;color:#e9f1ff;font-family:Inter}
header{padding:12px 16px;border-bottom:1px solid #2e445b;display:flex;justify-content:space-between}
main{display:grid;grid-template-columns:370px 1fr;gap:12px;padding:12px}
.card{background:#111d2b;border:1px solid #2a4158;border-radius:14px;padding:12px}
.list{max-height:80vh;overflow:auto;display:grid;gap:8px}.order{padding:10px;border:1px solid #36526d;border-radius:10px;cursor:pointer}
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
textarea,input,select,button{width:100%;box-sizing:border-box;background:#0d1824;color:#e9f1ff;border:1px solid #2d475f;border-radius:10px;padding:8px}
textarea{min-height:120px}.item{border:1px solid #334e68;border-radius:10px;padding:8px;margin-bottom:8px}.row{display:grid;grid-template-columns:1fr 120px 120px;gap:8px;align-items:center}
.muted{color:#9cb5cd;font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{width:auto}
.effect{border:1px solid #3a5874;border-radius:10px;padding:8px;margin-top:8px}.effect h4{margin:0 0 8px 0;font-size:13px}
.hidden{display:none}
</style><link rel="stylesheet" href="css/telegraph.css"><link rel="stylesheet" href="css/diplomacy.css"></head><body>
<header><b>Вердикты и эффекты</b><a href='admin_ui_alt.html' style='color:#9cc9ff'>← В админ alt</a></header>
<main>
<section class='card'>
  <div class='actions'><button id='reload'>Обновить очередь</button></div>
  <div class='row' style='grid-template-columns:1fr 1fr 1fr;margin-top:8px'>
    <input id='turn' type='number' placeholder='Год'><select id='status'><option value=''>Все</option><option>submitted</option><option>pending_review</option><option>needs_clarification</option><option>verdict_ready</option></select><input id='entity' placeholder='Сущность'>
  </div>
  <div class='row' style='grid-template-columns:1fr 1fr 1fr;margin-top:8px'>
    <select id='category'><option value=''>Все категории</option><option>economy</option><option>politics</option><option>laws</option><option>diplomacy</option><option>military</option><option>religion</option><option>intrigue</option><option>other</option></select>
    <select id='hasAttachments'><option value=''>Любые вложения</option><option value='true'>Есть вложения</option><option value='false'>Без вложений</option></select>
    <div class='muted'>Фильтры очереди</div>
  </div>
  <div id='list' class='list' style='margin-top:10px'></div>
</section>

<section class='card'>
  <div class='split'>
    <div>
      <h3 id='title'>—</h3>
      <div id='rp' class='muted'></div>
      <div id='images' class='muted' style='margin:8px 0'></div>
      <div id='items'></div><div class='effect'><h4>Связанные телеграммы</h4><div id='telegraphOrderLinks' class='muted'>Выберите приказ для загрузки связей.</div></div><div class='effect'><h4>Связанная дипломатия</h4><div id='diplomacyOrderLinks' class='muted'>Выберите приказ для загрузки связей.</div></div>
    </div>
    <div>
      <textarea id='publicVerdict' placeholder='Публичный РП-вердикт'></textarea>
      <textarea id='privateNotes' placeholder='Приватные заметки'></textarea>
      <textarea id='clarText' placeholder='Запрос на уточнение'></textarea>

      <div class='effect'>
        <h4>Механические изменения (без JSON)</h4>
        <div class='row' style='grid-template-columns:1fr 1fr'>
          <select id='effType'>
            <option value='treasury_delta'>Казна сущности</option>
            <option value='entity_income_delta'>Доход сущности</option>
            <option value='province_income_delta'>Доход провинции</option>
            <option value='garrison_change'>Гарнизон провинции</option>
            <option value='militia_change'>Ополчение провинции</option>
            <option value='map_event_note'>Событие карты</option>
          </select>
          <input id='effItemId' placeholder='ID пункта (опц.)'>
        </div>
        <div class='row' style='grid-template-columns:1fr 1fr 1fr;margin-top:6px'>
          <input id='effPid' placeholder='PID провинции'>
          <input id='effDelta' type='number' placeholder='Δ / значение'>
          <input id='effReason' placeholder='Причина/текст'>
        </div>
        <div class='actions' style='margin-top:8px'>
          <button id='addEffect'>Добавить эффект</button>
          <button id='clearEffects'>Очистить</button>
        </div>
        <div id='effectsList' class='muted' style='margin-top:8px;white-space:pre-wrap'></div>
      </div>

      <textarea id='effects' class='hidden' placeholder='Effects JSON массив'></textarea>
      <div id='effectsPreview' class='muted' style='white-space:pre-wrap;border:1px dashed #335069;border-radius:8px;padding:8px;margin-top:6px'>Предпросмотр механических изменений появится здесь.</div>
      <div class='actions'>
        <button id='saveVerdict'>Сохранить вердикт</button><button id='apply'>Применить эффекты</button><button id='publish'>Опубликовать</button><button id='clar'>Запросить уточнение</button><button id='reject'>Отклонить</button>
      </div>
    </div>
  </div>
</section>
</main>
<script src='js/admin_orders_ui_alt.js'></script><script src='js/telegraph.js'></script><script src='js/diplomacy.js'></script><script src='js/diplomacy_ui.js'></script></body></html>
