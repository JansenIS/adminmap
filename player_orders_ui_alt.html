<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Приказы — кабинет игрока</title>
<style>body{margin:0;background:#0a1420;color:#e7f0ff;font-family:Inter,system-ui}header{padding:12px 16px;border-bottom:1px solid #2b4158;display:flex;justify-content:space-between}main{display:grid;grid-template-columns:340px 1fr;gap:12px;padding:12px}.card{background:#111d2b;border:1px solid #2a4158;border-radius:14px;padding:12px}.list{max-height:78vh;overflow:auto;display:grid;gap:8px}.order{padding:10px;border:1px solid #35506b;border-radius:10px;cursor:pointer}.order:hover{background:#16283a}input,textarea,select,button{width:100%;box-sizing:border-box;background:#0d1824;color:#e7f0ff;border:1px solid #2d475f;border-radius:10px;padding:8px}textarea{min-height:120px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions{display:flex;gap:8px}.actions button{width:auto}.muted{color:#9db4cc;font-size:12px}.items{display:grid;gap:8px}.item{border:1px solid #304a63;border-radius:10px;padding:8px}</style></head>
<body><header><div><b>Приказы</b><div class="muted">Игра через намерения и вердикты</div></div><div><a href="player_admin_ui_alt.html" style="color:#9cc9ff">← В alt-панель</a></div></header>
<main><section class="card"><div class="actions"><button id="newBtn">Создать приказ</button><button id="reloadBtn">Обновить</button></div><div class="row" style="margin-top:8px"><select id="statusFilter"><option value="">Все статусы</option><option>draft</option><option>submitted</option><option>needs_clarification</option><option>verdict_ready</option><option>published</option></select><input id="turnFilter" type="number" placeholder="Ход/год"></div><div id="list" class="list" style="margin-top:8px"></div></section>
<section class="card"><div class="row"><input id="title" placeholder="Заголовок приказа"><input id="turnYear" type="number" placeholder="Год"></div><textarea id="rpPost" placeholder="Большой РП-пост"></textarea><div class="muted">Пункты намерений</div><div id="items" class="items"></div><button id="addItemBtn" type="button">+ Добавить пункт</button><div class="row" style="margin-top:8px"><input id="publicImage" placeholder="URL публичного изображения"><button id="addImageBtn">Добавить изображение</button></div><div id="images" class="muted"></div><div class="actions" style="margin-top:10px"><button id="saveBtn">Сохранить черновик</button><button id="submitBtn">Отправить на рассмотрение</button></div><pre id="verdictBox" class="muted" style="white-space:pre-wrap"></pre></section></main>
<script src="js/player_orders_ui_alt.js"></script></body></html>
