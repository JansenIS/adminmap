<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Админка ходов</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:#0b0f14; color:#e7eef7; }
    .wrap { max-width:1200px; margin:0 auto; padding:16px; }
    h1 { margin:0 0 10px; font-size:22px; }
    .muted { color:#a6b4c5; font-size:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    .card { margin-top:12px; padding:12px; border:1px solid #223041; border-radius:12px; background:#0d131b; }
    label { display:block; font-size:12px; color:#a6b4c5; margin-bottom:6px; }
    input, select { background:#0b0f14; color:#e7eef7; border:1px solid #2b3f56; border-radius:10px; padding:8px 10px; }
    button { background:#1a2634; color:#e7eef7; border:1px solid #2b3f56; border-radius:10px; padding:8px 10px; cursor:pointer; font-weight:650; }
    button:hover { background:#223446; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { border-bottom:1px solid #223041; padding:8px; text-align:left; }
    th { color:#a6b4c5; font-weight:600; }
    .status { margin-top:8px; font-size:12px; color:#9ec3ff; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Админка ходов</h1>
    <div class="muted">Ручное управление годом/ходом: создание, обработка, публикация, откат и восстановление map_state из published snapshot.</div>

    <div class="card">
      <div class="row">
        <div>
          <label>Текущий published год</label>
          <input id="currentYear" type="text" value="—" readonly />
        </div>
        <div>
          <label>Текущий status</label>
          <input id="currentStatus" type="text" value="—" readonly />
        </div>
        <div>
          <button id="btnRefresh" type="button">Обновить</button>
        </div>
      </div>
      <div class="status" id="status">Готово.</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Source year</label>
          <input id="sourceYear" type="number" min="0" value="0" />
        </div>
        <div>
          <label>Target year</label>
          <input id="targetYear" type="number" min="1" value="1" />
        </div>
        <div>
          <label>Ruleset</label>
          <input id="rulesetVersion" type="text" value="v1.0" />
        </div>
        <div><button id="btnCreate" type="button">Создать ход</button></div>
        <div><button id="btnMakeNext" type="button">Сделать следующий ход (авто)</button></div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Turn year</label>
          <input id="actionYear" type="number" min="1" value="1" />
        </div>
        <div><button id="btnProcess" type="button">Process economy</button></div>
        <div><button id="btnPublish" type="button">Publish</button></div>
        <div><button id="btnRollback" type="button">Rollback</button></div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Сделать текущим год (restore-state)</label>
          <input id="setCurrentYear" type="number" min="1" value="1" />
        </div>
        <div><button id="btnSetCurrent" type="button">Выставить текущий год</button></div>
        <div><button id="btnResetTurns" type="button">Сбросить ходы</button></div>
        <div><button id="btnGenerateBaseline" type="button">Сгенерировать казну и население</button></div>
      </div>
      <div class="muted" style="margin-top:8px;">Кнопка восстанавливает <code>data/map_state.json</code> из published snapshot указанного года.</div>
    </div>

    <div class="card">
      <table>
        <thead><tr><th>Year</th><th>Status</th><th>Version</th><th>Entity treasury</th><th>Province treasury</th><th>Ledger</th></tr></thead>
        <tbody id="turnRows"></tbody>
      </table>
    </div>
  </div>

  <script src="js/turn_admin.js"></script>
</body>
</html>
